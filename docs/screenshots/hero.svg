    <!-- Kind chips -->
    <g transform="translate(284, 234)">
      <rect width="74" height="22" rx="11" fill="rgba(10,132,255,0.10)" stroke="rgba(10,132,255,0.28)"/>
      <circle cx="14" cy="11" r="3" fill="#0a84ff"/>
      <text x="24" y="15" fill="#0a84ff" font-size="11.5">Photos</text>
      <text x="58" y="15" fill="#0a84ff" font-size="11.5" opacity="0.7">312</text>
    </g>
    <g transform="translate(366, 234)">
      <rect width="62" height="22" rx="11" fill="#f3f3f5"/>
      <circle cx="14" cy="11" r="3" fill="#b56cff"/>
      <text x="24" y="15" fill="#515158" font-size="11.5">Raw</text>
      <text x="46" y="15" fill="#86868b" font-size="11.5">89</text>
    </g>
    <g transform="translate(436, 234)">
      <rect width="78" height="22" rx="11" fill="#f3f3f5"/>
      <circle cx="14" cy="11" r="3" fill="#ff9a3c"/>
      <text x="24" y="15" fill="#515158" font-size="11.5">Videos</text>
      <text x="62" y="15" fill="#86868b" font-size="11.5">82</text>
