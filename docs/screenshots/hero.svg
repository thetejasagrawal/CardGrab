<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#ececec"/>
    </linearGradient>
    <filter id="winShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fcb69f"/><stop offset="1" stop-color="#ff9472"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5ee7df"/><stop offset="1" stop-color="#b490ca"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4facfe"/><stop offset="1" stop-color="#00f2fe"/></linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fa709a"/><stop offset="1" stop-color="#fee140"/></linearGradient>
    <linearGradient id="t5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient>
    <linearGradient id="t6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#43e97b"/><stop offset="1" stop-color="#38f9d7"/></linearGradient>
    <linearGradient id="t7" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1e3c72"/><stop offset="1" stop-color="#2a5298"/></linearGradient>
    <linearGradient id="t8" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f6d365"/><stop offset="1" stop-color="#fda085"/></linearGradient>
    <linearGradient id="t9" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c471ed"/><stop offset="1" stop-color="#f64f59"/></linearGradient>
    <linearGradient id="t10" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#74ebd5"/><stop offset="1" stop-color="#9face6"/></linearGradient>
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#60a0ff" stop-opacity="0.65"/>
      <stop offset="0.3" stop-color="#c0d4ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Page background (transparent for repo) -->
  <rect width="1200" height="760" fill="transparent"/>

  <!-- Window -->
  <g filter="url(#winShadow)">
    <rect x="40" y="30" width="1120" height="700" rx="12" fill="url(#bg)"/>
  </g>

  <!-- Traffic lights -->
  <g>
    <circle cx="70" cy="58" r="6.5" fill="#ff5f57"/>
    <circle cx="92" cy="58" r="6.5" fill="#febc2e"/>
    <circle cx="114" cy="58" r="6.5" fill="#28c840"/>
  </g>

  <!-- Sidebar -->
  <g>
    <rect x="40" y="30" width="220" height="700" rx="12" fill="#e6e6e8" fill-opacity="0.55"/>
    <rect x="40" y="30" width="220" height="700" rx="12" fill="none"/>
    <line x1="260" y1="30" x2="260" y2="730" stroke="#000" stroke-opacity="0.07"/>

    <!-- Section: Cards -->
    <text x="62" y="120" fill="#86868b" font-size="11" font-weight="600" letter-spacing="0.7">CARDS</text>
    <rect x="48" y="132" width="204" height="28" rx="5" fill="#0a84ff"/>
    <g transform="translate(60, 142)" fill="white">
      <path d="M3 0h7l5 5v11a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V1a1 1 0 0 1 1-1Z" stroke="white" stroke-width="1.4" fill="none"/>
      <path d="M6 2v2M8 2v2M10 2v2" stroke="white" stroke-width="1.4"/>
    </g>
    <text x="82" y="151" fill="white" font-size="13" font-weight="500">SONY α7 IV</text>

    <!-- Section: Cameras -->
    <text x="62" y="200" fill="#86868b" font-size="11" font-weight="600" letter-spacing="0.7">CAMERAS</text>
    <text x="62" y="222" fill="#86868b" font-size="12">None connected</text>

    <!-- Section: Library -->
    <text x="62" y="270" fill="#86868b" font-size="11" font-weight="600" letter-spacing="0.7">LIBRARY</text>
    <g transform="translate(56, 282)">
      <rect width="200" height="26" rx="5" fill="transparent"/>
      <g transform="translate(10, 8)" stroke="#515158" stroke-width="1.4" fill="none">
