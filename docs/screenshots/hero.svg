    <text x="284" y="150" fill="#1d1d1f" font-size="22" font-weight="600" letter-spacing="-0.4">Sony α7 IV</text>
    <text x="284" y="172" fill="#515158" font-size="12.5">483 files · 24.5 GB · May 14–May 17</text>

    <!-- Toolbar -->
    <rect x="284" y="194" width="240" height="26" rx="6" fill="#f3f3f5"/>
    <g transform="translate(294, 200)" stroke="#86868b" stroke-width="1.8" fill="none">
      <circle cx="6.5" cy="6.5" r="5"/>
      <path d="m13 13-2.5-2.5" stroke-linecap="round"/>
    </g>
    <text x="308" y="212" fill="#86868b" font-size="12.5">Search filenames</text>

    <g transform="translate(540, 194)">
      <rect width="124" height="26" rx="6" fill="#f3f3f5"/>
      <g transform="translate(11, 7)" stroke="#86868b" stroke-width="2" fill="none">
        <path d="M0 0h7M0 3h5M0 6h3"/>
