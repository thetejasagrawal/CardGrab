    <g transform="translate(284, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t1)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(424, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t2)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(564, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t3)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="108" y="108" width="18" height="18" rx="9" fill="rgba(0,0,0,0.55)"/>
      <path d="m116 113 6 4-6 4z" fill="white"/>
    </g>
    <g transform="translate(704, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t4)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(844, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t5)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="6" y="6" width="28" height="14" rx="3" fill="rgba(0,0,0,0.55)"/>
      <text x="20" y="16" fill="white" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.5">RAW</text>
    </g>
    <g transform="translate(984, 302)">
      <rect width="132" height="132" rx="7" fill="url(#t6)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Date header 2 -->
    <text x="284" y="478" fill="#1d1d1f" font-size="13.5" font-weight="600">Yesterday</text>
    <text x="362" y="478" fill="#86868b" font-size="11.5">8 items</text>

    <!-- Thumb grid row 2 -->
    <g transform="translate(284, 492)">
      <rect width="132" height="132" rx="7" fill="url(#t7)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(424, 492)">
      <rect width="132" height="132" rx="7" fill="url(#t8)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(564, 492)">
      <rect width="132" height="132" rx="7" fill="url(#t9)"/>
      <circle cx="121" cy="11" r="9" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>
    </g>
    <g transform="translate(704, 492)">
      <rect width="132" height="132" rx="7" fill="url(#t10)"/>
      <circle cx="121" cy="11" r="9" fill="#0a84ff" stroke="#0a84ff"/>
      <path d="m116 11 3 3 6-7" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Bottom bar -->
    <rect x="260" y="680" width="900" height="50" fill="rgba(245,245,247,0.85)"/>
    <line x1="260" y1="680" x2="1160" y2="680" stroke="#000" stroke-opacity="0.07"/>
    <text x="284" y="700" fill="#1d1d1f" font-size="12.5" font-weight="600">234</text>
    <text x="304" y="700" fill="#515158" font-size="12.5">of 483 selected</text>
    <text x="408" y="700" fill="#86868b" font-size="12.5">·</text>
    <text x="420" y="700" fill="#86868b" font-size="12.5">12.4 GB</text>
    <text x="284" y="716" fill="#86868b" font-size="11.5">to</text>
    <text x="304" y="716" fill="#515158" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo">~/Pictures/cardgrab</text>
    <text x="450" y="716" fill="#0a84ff" font-size="11.5">Change…</text>

    <!-- Glass Import button -->
    <g transform="translate(950, 692)">
      <rect width="190" height="30" rx="15" fill="url(#glass)" stroke="#ffffff" stroke-width="0.5"/>
      <text x="95" y="20" fill="#0b1538" font-size="13" font-weight="600" text-anchor="middle">Import 234 items →</text>
    </g>
  </g>
</svg>
