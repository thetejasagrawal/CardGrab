    <line x1="48" y1="680" x2="252" y2="680" stroke="#000" stroke-opacity="0.07"/>
    <g transform="translate(56, 690)">
      <rect width="200" height="26" rx="5" fill="transparent"/>
      <g transform="translate(10, 8)" stroke="#515158" stroke-width="1.4" fill="none">
        <circle cx="6" cy="6" r="2"/>
        <path d="M11.4 7.2a1.1 1.1 0 0 0 .2 1.2l.05.05a1.4 1.4 0 1 1-2 2l-.04-.04a1.1 1.1 0 0 0-1.2-.22 1.1 1.1 0 0 0-.66 1V11.6a1.4 1.4 0 0 1-2.8 0v-.04A1.1 1.1 0 0 0 4 10.6a1.1 1.1 0 0 0-1.2.22l-.04.04a1.4 1.4 0 1 1-2-2L0.8 8.8a1.1 1.1 0 0 0 .22-1.2 1.1 1.1 0 0 0-1-.66H0a1.4 1.4 0 0 1 0-2.8h.04A1.1 1.1 0 0 0 1 3.4a1.1 1.1 0 0 0-.22-1.2L0.74 2.16a1.4 1.4 0 1 1 2-2l.04.05a1.1 1.1 0 0 0 1.2.22h.04a1.1 1.1 0 0 0 .66-1V0a1.4 1.4 0 0 1 2.8 0v.04A1.1 1.1 0 0 0 7.6 1a1.1 1.1 0 0 0 1.2-.22l.04-.04a1.4 1.4 0 1 1 2 2l-.04.04a1.1 1.1 0 0 0-.22 1.2v.04a1.1 1.1 0 0 0 1 .66H11.6a1.4 1.4 0 0 1 0 2.8h-.04a1.1 1.1 0 0 0-1 .66Z"/>
      </g>
      <text x="32" y="18" fill="#1d1d1f" font-size="13">Settings</text>
    </g>
