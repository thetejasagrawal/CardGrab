<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#ececec"/>
    </linearGradient>
    <filter id="winShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#0a84ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="transparent"/>

  <!-- Window -->
  <g filter="url(#winShadow)">
    <rect x="40" y="30" width="1120" height="700" rx="12" fill="url(#bg)"/>
  </g>

  <!-- Traffic lights -->
  <circle cx="70" cy="58" r="6.5" fill="#ff5f57"/>
  <circle cx="92" cy="58" r="6.5" fill="#febc2e"/>
  <circle cx="114" cy="58" r="6.5" fill="#28c840"/>

  <!-- Sidebar (same as hero, dimmed) -->
  <rect x="40" y="30" width="220" height="700" rx="12" fill="#e6e6e8" fill-opacity="0.55"/>
  <line x1="260" y1="30" x2="260" y2="730" stroke="#000" stroke-opacity="0.07"/>

  <text x="62" y="120" fill="#86868b" font-size="11" font-weight="600" letter-spacing="0.7">CARDS</text>
  <rect x="48" y="132" width="204" height="28" rx="5" fill="transparent"/>
  <text x="82" y="151" fill="#1d1d1f" font-size="13" font-weight="500">SONY α7 IV</text>

  <text x="62" y="200" fill="#86868b" font-size="11" font-weight="600" letter-spacing="0.7">LIBRARY</text>
  <text x="62" y="222" fill="#86868b" font-size="13">History</text>

  <!-- Title bar -->
  <line x1="260" y1="82" x2="1160" y2="82" stroke="#000" stroke-opacity="0.07"/>
  <text x="284" y="68" fill="#1d1d1f" font-size="13.5" font-weight="600">Importing</text>
  <g transform="translate(1080, 50)">
    <text x="30" y="15" fill="#1d1d1f" font-size="12" text-anchor="middle">Cancel</text>
  </g>

  <!-- Main content -->
  <g transform="translate(420, 180)">
    <!-- Header line -->
    <text x="0" y="0" fill="#515158" font-size="13">File 167 of 234</text>

    <!-- Progress bar -->
    <rect x="0" y="20" width="600" height="6" rx="3" fill="#e9e9ec"/>
    <rect x="0" y="20" width="430" height="6" rx="3" fill="#0a84ff"/>

    <!-- Bar meta -->
    <text x="0" y="64" fill="#1d1d1f" font-size="22" font-weight="600" letter-spacing="-0.3">71.4%</text>
    <text x="600" y="55" fill="#515158" font-size="12" text-anchor="end">8.9 GB / 12.4 GB</text>
    <text x="475" y="55" fill="#86868b" font-size="12" text-anchor="end">·</text>
    <text x="600" y="68" fill="#515158" font-size="12" text-anchor="end">218 MB/s</text>
    <text x="535" y="68" fill="#86868b" font-size="12" text-anchor="end">·</text>
    <text x="600" y="80" fill="#86868b" font-size="12" text-anchor="end">ETA 16s</text>

    <!-- Current file card -->
    <rect x="0" y="120" width="600" height="56" rx="9" fill="#ffffff"/>
    <text x="14" y="138" fill="#86868b" font-size="10.5" font-weight="600" letter-spacing="0.7">CURRENT FILE</text>
    <text x="14" y="160" fill="#1d1d1f" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo">PRIVATE/M4ROOT/CLIP/C0094.MP4</text>
  </g>
</svg>
